<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tesla Auto Connect</title><style>
body{margin:0;font-family:Arial;background:#111;color:#fff}header{padding:18px 40px;background:#000;position:sticky;top:0}

<header><h2>Tesla Auto Connect</h2></header>

<div class="wrap"><h2>Available Models</h2><div class="grid">

<footer>Tesla Auto Connect</footer>
